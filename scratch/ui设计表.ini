左栏（搜查笔记） {
    顶栏（提示栏） {
        tips text: 提示语
        tips bg: 顶栏背景
    }
    底栏（询问） {
        ask avatar: 大概5、6个头像
        ask pg up|dn: 翻页按钮
        ask bg: 底栏背景
    }
    滚动条 {
        clue scroll mask: 滚动条顶部遮罩（两条线）
        clue scroll select pos: 选中位置
        clue scroll pg up|dn: 两段上下翻页按钮
        clue scroll view: 滚动条主体（对应视野范围）
        clue scroll bg star: 收藏块背景
        clue scroll bg trash: 垃圾块背景
    }
    详情栏 {
        desc close: 关闭（右上角一个叉）
        desc title: 标题
        desc title bg: 标题下的遮罩背景（以及底部的渐变遮罩）
        desc star|trash: 收藏和垃圾按钮
        desc body: 详情正文
    }
    线索列表 {
        clue list item title: 线索标题文本
        clue list item bg: 线索背景（下边一条边框，选中的线索背景变黑）
    }
    lbar bg: 左栏背景（颜色比对话区稍微暗一点点）
}

右栏 {
    设置（可以暂时不做） {
        opt main: 主按钮
        opt xxx: 展开后的一系列开关
        // TODO: 选项
    }
    页码 {
        pgnum title: “对话页码”
        pgnum txt: 页数文本
        pgnum pg up1|dn1|up10|dn10: 翻页键，有翻一页的，有翻十页的
    }
    rbar bg: 右栏背景
}

聊天页面 {
    一条对话 {
        bubble avatar: 头像
        bubble txt: 对话文本
        bubble bg: 气泡背景
    }
    笔记指令 {
        note txt: 笔记文本
        note bg: 笔记背景
    }
}